<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="六爻 AI 起卦与解读系统。">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="六爻 AI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>六爻 AI 系统</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app-loading" role="status" aria-live="polite">
    <div class="loading-mark">六爻 AI</div>
    <div id="loading-message">正在载入起卦系统...</div>
  </div>
  <style>
    html, body { margin: 0; min-height: 100%; background: #f4f8fb; }
    #app-loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      color: #16314d; font: 17px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #e7fafc, #f7fcfe 48%, #f1eeff);
      z-index: 9999;
    }
    .loading-mark { font-weight: 700; font-size: 28px; }
  </style>
  <script>
    var flutterCacheVersion = '20260717-safari-fix-2';
    window.showFlutterLoadError = function () {
      document.getElementById('loading-message').textContent = '页面加载失败，请关闭此页后重新打开链接。';
    };
    window.removeFlutterLoading = function () {
      var loading = document.getElementById('app-loading');
      if (loading) loading.remove();
    };
    window.setTimeout(function () {
      var loading = document.getElementById('app-loading');
      if (loading) window.showFlutterLoadError();
    }, 20000);

    window.clearLegacyFlutterCache = function () {
      if (!('serviceWorker' in navigator) || sessionStorage.getItem('liuyao-sw-cleared')) {
        return Promise.resolve(false);
      }
      return navigator.serviceWorker.getRegistrations().then(function (registrations) {
        var pageScope = window.location.origin + '/ganzhi-nayin-calendar/';
        var legacyRegistrations = registrations.filter(function (registration) {
          return registration.scope.indexOf(pageScope) === 0;
        });
        if (legacyRegistrations.length === 0) return false;
        return Promise.all(legacyRegistrations.map(function (registration) {
          return registration.unregister();
        })).then(function () {
          sessionStorage.setItem('liuyao-sw-cleared', 'true');
          var url = new URL(window.location.href);
          url.searchParams.set('v', flutterCacheVersion);
          window.location.replace(url.toString());
          return true;
        });
      }).catch(function () {
        return false;
      });
    };

    window.clearLegacyFlutterCache().then(function (isReloading) {
      if (isReloading) return;
      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js?v=' + flutterCacheVersion;
      script.async = true;
      script.onerror = window.showFlutterLoadError;
      document.body.appendChild(script);
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
</body>
</html>
