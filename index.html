<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f3eb">
  <title>十年干支纳音日历</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f3eb;
      --paper-deep: #eee7dc;
      --ink: #222222;
      --muted: #80776a;
      --jade: #315b57;
      --red: #b04438;
      --gold: #b9965a;
      --line: #d9d0c3;
      --white: rgba(255, 255, 255, 0.34);
      --shadow: 0 24px 70px rgba(54, 44, 31, 0.12);
      --serif: "Songti SC", "STSong", "Noto Serif CJK SC", "Microsoft YaHei", serif;
      --sans: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 4%, rgba(185, 150, 90, 0.09), transparent 25rem),
        var(--paper-deep);
      color: var(--ink);
      font-family: var(--serif);
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }

    button { color: inherit; }

    .app-shell {
      width: min(1440px, calc(100% - 40px));
      min-height: calc(100vh - 40px);
      margin: 20px auto;
      padding: clamp(20px, 3vw, 44px);
      background: var(--paper);
      border: 1px solid rgba(160, 145, 124, 0.35);
      box-shadow: var(--shadow);
    }

    .app-header {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 24px;
      border-bottom: 1px solid #8d8579;
    }

    .brand {
      margin: 0 0 8px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.24em;
    }

    .month-title {
      display: flex;
      gap: 16px;
      align-items: baseline;
      margin: 0;
      font-weight: 500;
      line-height: 1;
    }

    .month-title .month {
      color: var(--red);
      font-size: clamp(36px, 5vw, 58px);
    }

    .month-title .year {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(22px, 3vw, 32px);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      font-family: var(--sans);
    }

    .nav-group {
      display: flex;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.24);
    }

    .icon-button,
    .text-button {
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      transition: color 150ms ease, background 150ms ease, transform 150ms ease;
    }

    .icon-button {
      display: inline-grid;
      width: 38px;
      place-items: center;
      padding: 0;
    }

    .icon-button svg,
    .text-button svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.8;
    }

    .text-button {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      padding: 0 14px;
      border: 1px solid var(--line);
      color: var(--jade);
      background: rgba(255, 255, 255, 0.22);
      white-space: nowrap;
      font-size: 13px;
    }

    .today-button {
      padding: 0 15px;
      color: var(--red);
      font-size: 13px;
    }

    .icon-button:hover,
    .today-button:hover,
    .text-button:hover {
      background: rgba(49, 91, 87, 0.09);
    }

    button:active { transform: translateY(1px); }
    button:focus-visible, input:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    button:disabled { opacity: 0.28; cursor: not-allowed; }

    .date-picker-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .date-picker-wrap input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .week-header,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .week-header {
      color: var(--muted);
      font-family: var(--sans);
      font-size: 11px;
      text-align: center;
    }

    .week-header span { padding: 13px 4px; }
    .week-header span:nth-last-child(-n + 2) { color: var(--red); }

    .calendar-grid {
      grid-template-rows: repeat(6, minmax(94px, 1fr));
      min-height: min(710px, calc(100vh - 230px));
      border-left: 1px solid var(--line);
      border-top: 1px solid var(--line);
    }

    .day-cell,
    .empty-cell {
      min-width: 0;
      border: 0;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.09);
    }

    .empty-cell { background: rgba(185, 150, 90, 0.025); }

    .day-cell {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: clamp(8px, 1vw, 14px);
      text-align: left;
      cursor: pointer;
      transition: background 140ms ease, box-shadow 140ms ease;
    }

    .day-cell:nth-child(7n + 6),
    .day-cell:nth-child(7n) { background: rgba(185, 150, 90, 0.04); }

    .day-cell:hover { background: rgba(255, 255, 255, 0.5); }

    .day-cell.selected {
      z-index: 1;
      background: #fffaf5;
      box-shadow: inset 0 0 0 2px var(--red);
    }

    .day-number {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(22px, 2.3vw, 32px);
      line-height: 1;
    }

    .selected .day-number { color: var(--red); }

    .today-dot {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
    }

    .day-meta { margin-top: auto; min-width: 0; }

    .day-ganzhi,
    .day-nayin {
      overflow: hidden;
      margin: 0;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .day-ganzhi {
      color: var(--red);
      font-size: clamp(11px, 1.1vw, 14px);
    }

    .day-nayin {
      margin-top: 5px;
      color: var(--jade);
      font-size: clamp(11px, 1.1vw, 14px);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .calendar-footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 13px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 10px;
    }

    .legend { display: flex; gap: 18px; }

    .legend i {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-right: 5px;
      border-radius: 50%;
      background: var(--red);
      vertical-align: 1px;
    }

    .legend i.jade { background: var(--jade); }

    dialog {
      width: min(560px, calc(100vw - 28px));
      max-height: min(760px, calc(100vh - 28px));
      padding: 0;
      border: 1px solid rgba(160, 145, 124, 0.45);
      border-radius: 14px;
      color: var(--ink);
      background: var(--paper);
      box-shadow: 0 26px 80px rgba(44, 36, 25, 0.28);
    }

    dialog::backdrop {
      background: rgba(34, 31, 26, 0.28);
      backdrop-filter: blur(3px);
    }

    .dialog-inner { padding: 26px; }

    .dialog-header {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .dialog-header h2 { margin: 0; font-size: 26px; font-weight: 500; }
    .dialog-header p { margin: 7px 0 0; color: var(--muted); font-family: var(--sans); font-size: 13px; }

    .pillar-row {
      display: grid;
      grid-template-columns: 62px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 17px 0;
      border-bottom: 1px solid var(--line);
    }

    .pillar-row:last-child { border-bottom: 0; }
    .pillar-label { color: var(--muted); font-family: var(--sans); font-size: 13px; }
    .pillar-ganzhi { color: var(--jade); font-size: 24px; font-weight: 600; }
    .pillar-nayin { color: var(--red); font-size: 16px; }

    #nayin-dialog { width: min(980px, calc(100vw - 28px)); }

    .search-input {
      width: 100%;
      height: 44px;
      margin: 18px 0;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 9px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.34);
      font-family: var(--sans);
    }

    .nayin-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      max-height: min(590px, calc(100vh - 210px));
      overflow: auto;
      padding-right: 3px;
    }

    .nayin-item {
      min-width: 0;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.25);
    }

    .nayin-item h3 { margin: 0; color: var(--jade); font-size: 19px; font-weight: 600; }
    .nayin-pair { margin: 8px 0 4px; }
    .nayin-element, .nayin-years { margin: 3px 0 0; color: var(--muted); font-family: var(--sans); font-size: 11px; }
    .nayin-element { color: var(--red); }
    .empty-result { grid-column: 1 / -1; padding: 50px 10px; color: var(--muted); text-align: center; }

    @media (max-width: 920px) {
      .app-header { grid-template-columns: 1fr; gap: 16px; }
      .toolbar { justify-content: flex-start; overflow-x: auto; padding-bottom: 3px; }
      .nayin-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .calendar-grid { min-height: 620px; }
    }

    @media (max-width: 620px) {
      body { background: var(--paper); }
      .app-shell { width: 100%; min-height: 100vh; margin: 0; padding: 16px 8px; border: 0; box-shadow: none; }
      .app-header { padding-bottom: 14px; }
      .brand { font-size: 9px; }
      .month-title .month { font-size: 34px; }
      .month-title .year { font-size: 22px; }
      .toolbar {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-inline: -2px;
        overflow: visible;
      }
      .nav-group {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        width: 100%;
      }
      .nav-group .icon-button { width: auto; }
      .date-picker-wrap,
      .date-picker-wrap .text-button,
      #open-nayin { width: 100%; }
      .date-picker-wrap .text-button,
      #open-nayin { justify-content: center; }
      .text-button { padding-inline: 11px; }
      .week-header span { padding: 10px 2px; font-size: 9px; }
      .calendar-grid { grid-template-rows: repeat(6, minmax(72px, 1fr)); min-height: min(520px, calc(100vh - 220px)); }
      .day-cell { padding: 6px 4px; }
      .day-number { font-size: 18px; }
      .today-dot { top: 7px; right: 6px; width: 5px; height: 5px; }
      .day-ganzhi, .day-nayin { font-size: 9px; letter-spacing: 0; }
      .day-nayin { margin-top: 3px; }
      .calendar-footer { font-size: 9px; }
      .range-note { display: none; }
      .dialog-inner { padding: 20px; }
      .pillar-row { grid-template-columns: 46px 1fr auto; gap: 8px; }
      .pillar-ganzhi { font-size: 21px; }
      .pillar-nayin { font-size: 14px; }
      .nayin-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .nayin-item { padding: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="brand">十年干支纳音日历</p>
        <h1 class="month-title" aria-live="polite">
          <span class="month" id="month-label">七月</span>
          <span class="year" id="year-label">2026</span>
        </h1>
      </div>

      <div class="toolbar" aria-label="日历工具栏">
        <div class="nav-group">
          <button class="icon-button" id="previous-year" type="button" aria-label="上一年" title="上一年">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m11 17-5-5 5-5M18 17l-5-5 5-5"/></svg>
          </button>
          <button class="icon-button" id="previous-month" type="button" aria-label="上一个月" title="上一个月">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <button class="today-button" id="today-button" type="button">看今天</button>
          <button class="icon-button" id="next-month" type="button" aria-label="下一个月" title="下一个月">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="icon-button" id="next-year" type="button" aria-label="下一年" title="下一年">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 17 5-5-5-5M13 17l5-5-5-5"/></svg>
          </button>
        </div>

        <div class="date-picker-wrap">
          <input id="date-picker" type="date" min="2026-01-01" max="2035-12-31" aria-label="查找日期">
          <button class="text-button" id="date-picker-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
            查找日期
          </button>
        </div>

        <button class="text-button" id="open-nayin" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V4H6.5A2.5 2.5 0 0 0 4 6.5v13Z"/><path d="M8 7h8M8 11h7"/></svg>
          六十纳音
        </button>
      </div>
    </header>

    <div class="week-header" aria-hidden="true">
      <span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span><span>周日</span>
    </div>
    <section class="calendar-grid" id="calendar-grid" aria-label="月历"></section>

    <footer class="calendar-footer">
      <div class="legend"><span><i></i>日干支</span><span><i class="jade"></i>六十纳音</span></div>
      <span class="range-note">离线数据范围 · 2026年1月—2035年12月</span>
    </footer>
  </main>

  <dialog id="day-dialog" aria-labelledby="detail-title">
    <div class="dialog-inner">
      <header class="dialog-header">
        <div>
          <h2 id="detail-title"></h2>
          <p id="detail-subtitle"></p>
        </div>
        <button class="icon-button" data-close="day-dialog" type="button" aria-label="关闭日期详情">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </header>
      <div id="pillar-list"></div>
    </div>
  </dialog>

  <dialog id="nayin-dialog" aria-labelledby="nayin-title">
    <div class="dialog-inner">
      <header class="dialog-header">
        <div>
          <h2 id="nayin-title">六十纳音表</h2>
          <p>可按干支、纳音名称或五行查询</p>
        </div>
        <button class="icon-button" data-close="nayin-dialog" type="button" aria-label="关闭六十纳音表">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </header>
      <input class="search-input" id="nayin-search" type="search" placeholder="例如：甲子、天河水、木" autocomplete="off">
      <div class="nayin-grid" id="nayin-grid"></div>
    </div>

      const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
      const nayinNames = ['海中金', '炉中火', '大林木', '路旁土', '剑锋金', '山头火', '涧下水', '城头土', '白蜡金', '杨柳木', '泉中水', '屋上土', '霹雳火', '松柏木', '长流水', '沙中金', '山下火', '平地木', '壁上土', '金箔金', '覆灯火', '天河水', '大驿土', '钗钏金', '桑柘木', '大溪水', '沙中土', '天上火', '石榴木', '大海水'];
      const elements = ['金', '火', '木', '土', '金', '火', '水', '土', '金', '木', '水', '土', '火', '木', '水', '金', '火', '木', '土', '金', '火', '水', '土', '金', '木', '水', '土', '火', '木', '水'];
      const stems = '甲乙丙丁戊己庚辛壬癸';
      const branches = '子丑寅卯辰巳午未申酉戌亥';
      const nayinGroups = nayinNames.map((name, groupIndex) => ({
        name,
        element: elements[groupIndex],
        ganzhi: [groupIndex * 2, groupIndex * 2 + 1].map((index) => stems[index % 10] + branches[index % 12]),
      }));

      const yearLookup = new Map();
      for (const day of dataset.days) {
        if (!yearLookup.has(day.yearNayin)) yearLookup.set(day.yearNayin, new Set());
        yearLookup.get(day.yearNayin).add(Number(day.date.slice(0, 4)));
      }

      const state = {
        visibleMonth: new Date(today.getFullYear(), today.getMonth(), 1),
        selectedDate: formatDate(today),
      };

      const calendarGrid = document.getElementById('calendar-grid');
      const monthLabel = document.getElementById('month-label');
      const yearLabel = document.getElementById('year-label');
      const datePicker = document.getElementById('date-picker');
      const dayDialog = document.getElementById('day-dialog');
      const nayinDialog = document.getElementById('nayin-dialog');
      const nayinSearch = document.getElementById('nayin-search');

      function parseDate(value) {
        const [year, month, day] = value.split('-').map(Number);
        return new Date(year, month - 1, day);
      }

      function formatDate(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
      }

      function sameMonth(left, right) {
        return left.getFullYear() === right.getFullYear() && left.getMonth() === right.getMonth();
      }

      function clampDate(date) {
        if (date < minDate) return new Date(minDate);
        if (date > maxDate) return new Date(maxDate);
        return new Date(date.getFullYear(), date.getMonth(), date.getDate());
      }

      function clampMonth(date) {
        if (date < minMonth) return new Date(minMonth);
        if (date > maxMonth) return new Date(maxMonth);
        return new Date(date.getFullYear(), date.getMonth(), 1);
      }

      function moveMonth(amount) {
        state.visibleMonth = clampMonth(new Date(state.visibleMonth.getFullYear(), state.visibleMonth.getMonth() + amount, 1));
        renderCalendar();
      }

      function locateToday({ scroll = false } = {}) {
        state.visibleMonth = new Date(today.getFullYear(), today.getMonth(), 1);
        state.selectedDate = formatDate(today);
        datePicker.value = state.selectedDate;
        renderCalendar();
        if (!scroll) return;
        requestAnimationFrame(() => {
          const selectedCell = calendarGrid.querySelector(`[data-date="${state.selectedDate}"]`);
          selectedCell?.scrollIntoView({ block: 'nearest', inline: 'nearest' });
        });
      }

      function renderCalendar() {
        const year = state.visibleMonth.getFullYear();
        const month = state.visibleMonth.getMonth();
        const firstWeekday = (new Date(year, month, 1).getDay() + 6) % 7;
        const dayCount = new Date(year, month + 1, 0).getDate();
        const fragment = document.createDocumentFragment();

        monthLabel.textContent = monthNames[month];
        yearLabel.textContent = String(year);
        calendarGrid.setAttribute('aria-label', `${year}年${month + 1}月月历`);

        for (let index = 0; index < 42; index += 1) {
          const dayNumber = index - firstWeekday + 1;
          if (dayNumber < 1 || dayNumber > dayCount) {
            const empty = document.createElement('div');
            empty.className = 'empty-cell';
            empty.setAttribute('aria-hidden', 'true');
            fragment.appendChild(empty);
            continue;
          }

          const date = new Date(year, month, dayNumber);
          const key = formatDate(date);
          const day = daysByDate.get(key);
          const cell = document.createElement('button');
          cell.type = 'button';
          cell.className = `day-cell${state.selectedDate === key ? ' selected' : ''}`;
          cell.dataset.date = key;
          cell.setAttribute('aria-label', day ? `${year}年${month + 1}月${dayNumber}日，${day.dayGanzhi}，${day.dayNayin}` : `${year}年${month + 1}月${dayNumber}日`);
          cell.disabled = !day;
          cell.innerHTML = `
            <span class="day-number">${dayNumber}</span>
            ${key === formatDate(today) ? '<span class="today-dot" aria-label="今天"></span>' : ''}
            ${day ? `<span class="day-meta"><p class="day-ganzhi">${day.dayGanzhi}</p><p class="day-nayin">${day.dayNayin}</p></span>` : ''}
          `;
          if (day) cell.addEventListener('click', () => showDay(day));
          fragment.appendChild(cell);
        }

        calendarGrid.replaceChildren(fragment);
        document.getElementById('previous-year').disabled = sameMonth(state.visibleMonth, minMonth) || state.visibleMonth < new Date(minMonth.getFullYear() + 1, minMonth.getMonth(), 1);
        document.getElementById('previous-month').disabled = sameMonth(state.visibleMonth, minMonth);
        document.getElementById('next-month').disabled = sameMonth(state.visibleMonth, maxMonth);
        document.getElementById('next-year').disabled = sameMonth(state.visibleMonth, maxMonth) || state.visibleMonth > new Date(maxMonth.getFullYear() - 1, maxMonth.getMonth(), 1);
      }

      function showDay(day) {
        state.selectedDate = day.date;
        document.getElementById('detail-title').textContent = `${day.date.slice(0, 4)}年${Number(day.date.slice(5, 7))}月${Number(day.date.slice(8, 10))}日`;
        document.getElementById('detail-subtitle').textContent = `${day.lunarDate} · ${day.weekDay}`;
        document.getElementById('pillar-list').innerHTML = [
          ['年柱', day.yearGanzhi, day.yearNayin],
          ['月柱', day.monthGanzhi, day.monthNayin],
          ['日柱', day.dayGanzhi, day.dayNayin],
        ].map(([label, ganzhi, nayin]) => `
          <div class="pillar-row">
            <span class="pillar-label">${label}</span>
            <strong class="pillar-ganzhi">${ganzhi}</strong>
            <span class="pillar-nayin">${nayin}</span>
          </div>
        `).join('');
        renderCalendar();
        dayDialog.showModal();
      }

      function renderNayin(query = '') {
        const keyword = query.trim();
        const entries = nayinGroups.filter((entry) => !keyword || entry.name.includes(keyword) || entry.element.includes(keyword) || entry.ganzhi.some((item) => item.includes(keyword)));
        const grid = document.getElementById('nayin-grid');
        if (!entries.length) {
          grid.innerHTML = '<p class="empty-result">没有找到对应的干支或纳音</p>';
          return;
        }
        grid.innerHTML = entries.map((entry) => {
          const years = [...(yearLookup.get(entry.name) || [])].sort((a, b) => a - b);
          return `
            <article class="nayin-item">
              <h3>${entry.name}</h3>
              <p class="nayin-pair">${entry.ganzhi.join(' · ')}</p>
              <p class="nayin-element">五行 · ${entry.element}</p>
              ${years.length ? `<p class="nayin-years">对应年份 · ${years.join('、')}</p>` : ''}
            </article>
          `;
        }).join('');
      }

      document.getElementById('previous-year').addEventListener('click', () => moveMonth(-12));
      document.getElementById('previous-month').addEventListener('click', () => moveMonth(-1));
      document.getElementById('next-month').addEventListener('click', () => moveMonth(1));
      document.getElementById('next-year').addEventListener('click', () => moveMonth(12));
      document.getElementById('today-button').addEventListener('click', () => locateToday({ scroll: true }));
      document.getElementById('date-picker-button').addEventListener('click', () => {
        if (typeof datePicker.showPicker === 'function') datePicker.showPicker();
        else datePicker.click();
      });
      datePicker.addEventListener('change', () => {
        const day = daysByDate.get(datePicker.value);
        if (!day) return;
        const date = parseDate(day.date);
        state.visibleMonth = new Date(date.getFullYear(), date.getMonth(), 1);
        showDay(day);
      });
      document.getElementById('open-nayin').addEventListener('click', () => {
        nayinSearch.value = '';
        renderNayin();
        nayinDialog.showModal();
        requestAnimationFrame(() => nayinSearch.focus());
      });
      nayinSearch.addEventListener('input', () => renderNayin(nayinSearch.value));
      document.querySelectorAll('[data-close]').forEach((button) => {
        button.addEventListener('click', () => document.getElementById(button.dataset.close).close());
      });
      [dayDialog, nayinDialog].forEach((dialog) => {
        dialog.addEventListener('click', (event) => {
          if (event.target === dialog) dialog.close();
        });
      });

      locateToday({ scroll: true });
    })();
  </script>
</body>
</html>
