<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>2026年7月中国干支日历</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="calendar-sheet" aria-labelledby="calendar-title">
        <header class="calendar-header">
          <div class="title-group">
            <p class="eyebrow">中国干支农历 · 二〇二六</p>
            <div class="title-row">
              <h1 id="calendar-title"><span>七月</span><b>2026</b></h1>
              <div class="pillar-summary" aria-label="干支信息">
                <p><span>年柱</span><strong id="year-pillar">丙午</strong></p>
                <p><span>月柱</span><strong id="month-pillar">甲午 · 乙未</strong></p>
              </div>
            </div>
            <p class="subtitle">公历 · 农历 · 日柱干支 · 二十四节气</p>
          </div>
          <button id="print-calendar" class="print-button" type="button">
            <span aria-hidden="true">⌁</span>
            打印 / 保存 PDF
          </button>
        </header>

        <div class="weekday-row" role="row" aria-label="星期">
          <div class="weekday" role="columnheader">周一</div>
          <div class="weekday" role="columnheader">周二</div>
          <div class="weekday" role="columnheader">周三</div>
          <div class="weekday" role="columnheader">周四</div>
          <div class="weekday" role="columnheader">周五</div>
          <div class="weekday weekend-label" role="columnheader">周六</div>
          <div class="weekday weekend-label" role="columnheader">周日</div>
        </div>

        <div id="calendar-grid" class="calendar-grid" role="grid" aria-label="2026年7月月历"></div>

        <footer class="calendar-footer">
          <div class="legend" aria-label="图例">
            <span><i class="legend-dot term-dot"></i>节气</span>
            <span><i class="legend-dot festival-dot"></i>节日 / 纪念日</span>
            <span><i class="legend-dot weekend-dot"></i>周末</span>
          </div>
          <p>小暑起乙未月 · 日期以北京时间历法规则计算</p>
        </footer>

        <p id="calendar-status" class="calendar-status" role="status" aria-live="polite" hidden></p>
      </section>
    </main>

    <script src="vendor/lunar.js"></script>
    <script src="calendar-core.js"></script>
    <script src="script.js"></script>
  </body>
</html>
